name: Build and Publish Images

on:
  push:
    branches: [main]
    paths:
      - 'gee-backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Frontend: Cloudflare Pages buildea y deployea automaticamente desde este repo.
# Este workflow solo buildea y publica las imagenes Docker del backend y geo-worker.

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  GEO_WORKER_IMAGE: ${{ github.repository }}/geo-worker

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality-backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: gee-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: gee-backend/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: mypy app/ --ignore-missing-imports
      - run: python3 -m pytest tests/test_reports_contract.py tests/test_tramites_schema.py tests/test_sugerencias_contract.py -q

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality-backend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: gee-backend
          file: gee-backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-geo-worker:
    name: Build Geo Worker Image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality-backend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.GEO_WORKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: gee-backend
          file: gee-backend/Dockerfile.geo
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-backend, build-geo-worker]
    # Solo deployar si el webhook esta configurado en el repo
    if: ${{ vars.DEPLOY_WEBHOOK_URL != '' }}
    steps:
      - name: Trigger redeploy via webhook
        run: |
          curl -X POST "${{ vars.DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            --fail --silent --show-error
