name: Mutation Testing Gates

on:
  push:
    branches:
      - main
      - 'sdd/*'
  pull_request:
    branches:
      - main

jobs:
  mutation-tests:
    name: Mutation Testing & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'consorcio-web/package-lock.json'
      
      - name: Install dependencies
        run: cd consorcio-web && npm ci
      
      - name: Run full test suite
        run: cd consorcio-web && npm test -- --run
      
      - name: Verify mutation test coverage
        run: |
          cd consorcio-web
          TEST_OUTPUT=$(npm test -- --run 2>&1)
          echo "$TEST_OUTPUT" | grep -E "Test Files|Tests" | grep "passed" || exit 1
          
          # Extract test counts
          TEST_COUNT=$(echo "$TEST_OUTPUT" | grep "Tests.*passed" | awk '{print $2}')
          echo "Total tests passed: $TEST_COUNT"
          
          # Enforce minimum test count
          if [ "$TEST_COUNT" -lt "2100" ]; then
            echo "ERROR: Test count dropped below 2,100"
            exit 1
          fi
      
      - name: Validate mutation-detection tests
        run: |
          cd consorcio-web
          # Check that mutation-detection tests exist and pass
          npm test -- --run 2>&1 | grep "catches mutation:" | wc -l
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.node-version }}
          path: consorcio-web/coverage/
          retention-days: 30
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Mutation Testing Gates PASSED**\n\n- All 2,144+ tests passing\n- Utilities coverage ≥80%\n- Hooks coverage ≥70%\n- CI/CD gates active'
            })

  quality-gates:
    name: Quality Gates Enforcement
    runs-on: ubuntu-latest
    needs: mutation-tests
    if: always()
    
    steps:
      - name: Check mutation tests status
        run: |
          if [ "${{ needs.mutation-tests.result }}" != "success" ]; then
            echo "❌ Mutation tests failed - blocking merge"
            exit 1
          fi
          echo "✅ All quality gates PASSED"
