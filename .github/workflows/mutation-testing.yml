name: Mutation Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'gee-backend/**'
      - 'consorcio-web/src/**'
      - 'consorcio-web/tests/**'
      - '.github/workflows/mutation-testing.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gee-backend/**'
      - 'consorcio-web/src/**'
      - 'consorcio-web/tests/**'
      - '.github/workflows/mutation-testing.yml'
  workflow_dispatch:
  schedule:
    # Nightly full mutation test suite
    - cron: '0 2 * * *'

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation-backend:
    name: Mutation Tests (Backend - cosmic-ray)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: gee-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: gee-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run mutation tests (cosmic-ray)
        id: mutation
        run: |
          python3 scripts/cosmic_gate.py --min-kill-rate 1.0 2>&1 | tee mutation_output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-backend
          path: gee-backend/coverage/mutation-report/
          retention-days: 30

      - name: Comment on PR with mutation score
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('gee-backend/mutation_output.log', 'utf8');
            
            // Extract kill rate from log
            const match = log.match(/Kill rate: ([\d.]+)%/);
            const killRate = match ? match[1] : 'unknown';
            
            const comment = `## 🧪 Backend Mutation Testing Results
            
            **Kill Rate**: ${killRate}%
            **Status**: ${killRate >= 100 ? '✅ PASS' : '❌ FAIL'}
            
            [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            See [MUTATION_TESTING.md](../../docs/MUTATION_TESTING.md) for more information.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if mutation tests didn't pass
        if: steps.mutation.outputs.exit_code != '0'
        run: |
          echo "❌ Backend mutation tests failed!"
          cat mutation_output.log
          exit 1

  mutation-frontend-placeholder:
    name: Mutation Tests (Frontend - stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: consorcio-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: consorcio-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend Mutation Testing Status
        run: |
          echo "📋 Frontend mutation testing configuration is ready."
          echo "🔜 Implementation of comprehensive mutation testing for frontend modules is scheduled for Phase 2."
          echo ""
          echo "See: https://github.com/${{ github.repository }}/blob/main/openspec/changes/frontend-mutation-expansion/PHASE_2_REAL_HOOKS.md"
          echo ""
          echo "Current Phase 1 Coverage:"
          echo "  ✅ Stryker configuration (stryker.config.json)"
          echo "  ✅ CI/CD workflow integration (this file)"
          echo "  ✅ Documentation and guides"
          echo "  ✅ Test infrastructure ready"
          echo ""
          echo "Phase 2 will add:"
          echo "  - Mutation tests for 5 utility functions"
          echo "  - Mutation tests for 8 React hooks"
          echo "  - Mutation tests for 9 key components"
          echo "  - ≥80% kill rate enforcement"
          echo "  - Automatic regressions reporting"

  mutation-summary:
    name: Mutation Testing Summary
    runs-on: ubuntu-latest
    needs: [mutation-backend, mutation-frontend-placeholder]
    if: always()
    steps:
      - name: Check mutation test results
        run: |
          if [ "${{ needs.mutation-backend.result }}" == "failure" ]; then
            echo "❌ Backend mutation tests FAILED"
            exit 1
          else
            echo "✅ Backend mutation tests PASSED"
          fi

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const backendStatus = '${{ needs.mutation-backend.result }}' == 'success' ? '✅ PASS' : '❌ FAIL';
            const summary = `## Mutation Testing Summary\n\n| Component | Status |\n|-----------|--------|\n| Backend (cosmic-ray) | ${backendStatus} |\n| Frontend (stryker) | 📋 Phase 2 (Ready) |\n\n**Docs**: See [Mutation Testing Guide](../../docs/MUTATION_TESTING.md) for details.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
