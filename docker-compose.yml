services:
  # ============================================
  # DATABASE - PostgreSQL + PostGIS
  # ============================================
  postgres:
    image: pgrouting/pgrouting:16-3.4-3.6.1
    container_name: consorcio-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: consorcio
      POSTGRES_USER: consorcio
      POSTGRES_PASSWORD: consorcio_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consorcio -d consorcio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # BACKEND - FastAPI with GEE
  # ============================================
  backend:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile
      target: development
    container_name: consorcio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./gee-backend/app:/app/app:ro
      - ./gee-backend/data/waterways:/app/data/waterways
      - ./consorcio-web/public/waterways:/app/public/waterways
      - ./consorcio-web/public/capas:/app/public/capas:ro
      - ./consorcio-web/public/data:/app/public/data:ro
      - ./gee-backend/credentials:/app/credentials:ro
      - backend-cache:/app/.cache
      - geo-data:/data/geo
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - RATE_LIMIT_DISABLED=true
      - DATABASE_URL=postgresql://consorcio:consorcio_dev@postgres:5432/consorcio
      - REDIS_URL=redis://redis:6379/0
      - GEO_WORKER_TILE_URL=http://geo-worker:8001
      - MARTIN_INTERNAL_URL=http://martin:3000
      - MARTIN_PUBLIC_URL=
      - CORS_ORIGINS=https://consorcio-canalero.pages.dev,http://localhost:5173,http://localhost:3000
    env_file:
      - ./gee-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app

  # ============================================
  # REDIS - Broker for Celery
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: consorcio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # WORKER - Background Tasks (Celery)
  # ============================================
  worker:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile
      target: development
    container_name: consorcio-worker
    restart: unless-stopped
    volumes:
      - ./gee-backend/app:/app/app:ro
      - ./gee-backend/credentials:/app/credentials:ro
      - geo-data:/data/geo
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://consorcio:consorcio_dev@postgres:5432/consorcio
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./gee-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: celery -A app.core.celery_app worker --loglevel=info -Q celery

  # ============================================
  # GEO WORKER - GDAL-based terrain analysis
  # ============================================
  geo-worker:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile.geo
    container_name: consorcio-geo-worker
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./gee-backend/app:/app/app:ro
      - ./gee-backend/data/waterways:/app/data/waterways:ro
      - ./gee-backend/supervisord-geo.conf:/etc/supervisor/conf.d/geo.conf:ro
      - ./gee-backend/credentials:/app/credentials:ro
      - geo-data:/data/geo
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://consorcio:consorcio_dev@postgres:5432/consorcio
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./gee-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # MARTIN - PostGIS Vector Tile Server
  # ============================================
  martin:
    image: ghcr.io/maplibre/martin:v0.14.2
    container_name: consorcio-martin
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./martin/config.yaml:/config/config.yaml:ro
    command: --config /config/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================
  # TRAINER - U-Net Water Segmentation (GPU)
  # ============================================
  trainer:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile.trainer
    container_name: consorcio-trainer
    profiles: [training]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./gee-backend/app:/app/app:ro
      - ./gee-backend/scripts:/app/scripts:ro
      - ./gee-backend/credentials:/app/credentials:ro
      - ./consorcio-web/public/capas:/app/capas:ro
      - geo-data:/data/geo
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gee-sa-key.json
    env_file:
      - ./gee-backend/.env
    depends_on:
      - postgres

  # ============================================
  # FRONTEND - React with Vite
  # ============================================
  frontend:
    build:
      context: ./consorcio-web
      dockerfile: Dockerfile
      target: development
    container_name: consorcio-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./consorcio-web/src:/app/src:ro
      - ./consorcio-web/public:/app/public:ro
      - ./consorcio-web/.env:/app/.env:ro
      - frontend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - VITE_API_URL=http://localhost:8000
      - VITE_MARTIN_URL=http://localhost:3000
    env_file:
      - ./consorcio-web/.env
    depends_on:
      - backend
    networks:
      - consorcio-network
    command: npm run dev -- --host 0.0.0.0

# ============================================
# NETWORKS
# ============================================
networks:
  consorcio-network:
    driver: bridge
    name: consorcio-network

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres-data:
    name: consorcio-postgres-data
  backend-cache:
    name: consorcio-backend-cache
  frontend-node-modules:
    name: consorcio-frontend-node-modules
  geo-data:
    name: consorcio-geo-data
