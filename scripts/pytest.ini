[pytest]
# Pytest configuration for the ETL test suite under scripts/.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

minversion = 7.0
