# ===========================================
# Docker Compose - Hetzner (build en server)
# ===========================================
# Frontend: Cloudflare Pages (NO incluido).
# PostgreSQL + Redis: propios de este stack.
# Caddy rutea cc10demayo-api.javierzader.com:
#   /           → consorcio-backend:8000
#   /tiles/     → consorcio-martin:3000
#
# Uso:
#   cd ~/stacks/consorcio
#   cp .env.example .env  # editar valores reales
#   docker compose -f docker-compose.hetzner.yml up -d --build
# ===========================================

services:
  # --- PostgreSQL + PostGIS + pgRouting ---
  postgres:
    image: pgrouting/pgrouting:16-3.4-3.6.1
    container_name: consorcio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: consorcio
      POSTGRES_USER: ${DB_USER:-consorcio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-consorcio} -d consorcio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: consorcio-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - consorcio-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # --- Backend FastAPI ---
  backend:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile
      target: production
    container_name: consorcio-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - geo-data:/data/geo
      - ./gee-backend/data/waterways:/app/data/waterways:ro
      - ./credentials:/app/credentials:ro
    networks:
      - proxy
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Celery Worker ---
  celery-worker:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile
      target: production
    container_name: consorcio-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 -Q celery
    env_file: .env
    volumes:
      - geo-data:/data/geo
      - ./credentials:/app/credentials:ro
    networks:
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Geo Worker (GDAL + WhiteboxTools) ---
  geo-worker:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile.geo
    container_name: consorcio-geo-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - geo-data:/data/geo
      - ./gee-backend/data/waterways:/app/data/waterways:ro
      - ./gee-backend/supervisord-geo.conf:/etc/supervisor/conf.d/geo.conf:ro
      - ./credentials:/app/credentials:ro
    networks:
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Martin Vector Tile Server ---
  martin:
    image: ghcr.io/maplibre/martin:v0.14.2
    container_name: consorcio-martin
    restart: unless-stopped
    volumes:
      - ./martin-config.yaml:/config/config.yaml:ro
    command: --config /config/config.yaml
    networks:
      - proxy
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  proxy:
    external: true
  consorcio-internal:
    driver: bridge
    name: consorcio-internal

volumes:
  postgres-data:
    name: consorcio-postgres-data
  geo-data:
    name: consorcio-geo-data
