# ===========================================
# Docker Compose - Produccion (Hetzner / Dockge)
# ===========================================
# Frontend: Cloudflare Pages (NO incluido aqui).
# Esquema: imagenes pre-buildeadas desde GHCR.
# PostgreSQL y Redis son EXTERNOS (shared stack).
# Redes: proxy y backend son EXTERNAS (creadas una vez en el server).
#
# Arquitectura de dominios:
#   consorcio.DOMINIO       → Cloudflare Pages (frontend React)
#   api.consorcio.DOMINIO   → Caddy → consorcio-backend:8000
#   tiles.consorcio.DOMINIO → Caddy → consorcio-martin:3000
#
# Caddyfile en el server:
#   api.consorcio.{$DOMAIN} {
#     reverse_proxy consorcio-backend:8000
#   }
#   tiles.consorcio.{$DOMAIN} {
#     reverse_proxy consorcio-martin:3000
#   }
#
# Uso en servidor:
#   cp docker-compose.prod.yml /home/javier/stacks/consorcio/docker-compose.yml
#   cp .env.prod.example /home/javier/stacks/consorcio/.env  # editar con valores reales
#   cp martin/config.prod.yaml /home/javier/stacks/consorcio/martin-config.yaml
#   cd /home/javier/stacks/consorcio && docker compose up -d
# ===========================================

services:
  # --- Backend FastAPI ---
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/jnzader/consorcio-canalero/backend:latest}
    container_name: consorcio-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - geo-data:/data/geo
    networks:
      - proxy
      - backend
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      geo-worker:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Celery Worker (solo queue celery, sin GDAL) ---
  celery-worker:
    image: ${BACKEND_IMAGE:-ghcr.io/jnzader/consorcio-canalero/backend:latest}
    container_name: consorcio-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 -Q celery
    env_file: .env
    volumes:
      - geo-data:/data/geo
    networks:
      - backend
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Geo Worker (GDAL + WhiteboxTools, queue geo) ---
  geo-worker:
    image: ${GEO_WORKER_IMAGE:-ghcr.io/jnzader/consorcio-canalero/geo-worker:latest}
    container_name: consorcio-geo-worker
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    env_file: .env
    volumes:
      - geo-data:/data/geo
    networks:
      - backend
      - consorcio-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Martin Vector Tile Server ---
  martin:
    image: ghcr.io/maplibre/martin:v0.14.2
    container_name: consorcio-martin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./martin-config.yaml:/config/config.yaml:ro
    command: --config /config/config.yaml
    environment:
      # Martin necesita URL sin +asyncpg (postgresql://, no postgresql+asyncpg://)
      - DATABASE_URL=${MARTIN_DB_URL}
    networks:
      - backend
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# Redes EXTERNAS — creadas una sola vez en el server:
#   docker network create proxy
#   docker network create backend
networks:
  proxy:
    external: true
  backend:
    external: true
  consorcio-internal:
    driver: bridge
    name: consorcio-internal

volumes:
  geo-data:
    name: consorcio-geo-data
