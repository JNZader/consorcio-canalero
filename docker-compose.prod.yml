# ===========================================
# Docker Compose - Production (Coolify/Hetzner)
# ===========================================
# Frontend is on Cloudflare Pages — NOT included here.
# This runs: Postgres + Redis + Backend API + Celery Worker
#
# Required env vars (set in Coolify):
#   DATABASE_URL, JWT_SECRET, REDIS_PASSWORD

services:
  # ===========================================
  # DATABASE - PostgreSQL + PostGIS
  # ===========================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: consorcio-postgres
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: consorcio
      POSTGRES_USER: consorcio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consorcio -d consorcio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================
  # REDIS - Cache & Task Queue Broker
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: consorcio-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ===========================================
  # BACKEND - FastAPI API
  # ===========================================
  backend:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile
      target: production
    container_name: consorcio-backend
    restart: always
    expose:
      - "8000"
    volumes:
      - geo-data:/data/geo
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql://consorcio:${POSTGRES_PASSWORD:-changeme}@postgres:5432/consorcio
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GEE_PROJECT_ID=${GEE_PROJECT_ID:-cc10demayo}
      - GEE_SERVICE_ACCOUNT_KEY=${GEE_SERVICE_ACCOUNT_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://cc10demayo.javierzader.com}
      - FRONTEND_URL=${FRONTEND_URL:-https://cc10demayo.javierzader.com}
      - API_PREFIX=/api/v2
    networks:
      - consorcio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================
  # WORKER - Celery Background Tasks
  # ===========================================
  worker:
    build:
      context: ./gee-backend
      dockerfile: Dockerfile
      target: production
    container_name: consorcio-worker
    restart: always
    volumes:
      - geo-data:/data/geo
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql://consorcio:${POSTGRES_PASSWORD:-changeme}@postgres:5432/consorcio
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - GEE_PROJECT_ID=${GEE_PROJECT_ID:-cc10demayo}
      - GEE_SERVICE_ACCOUNT_KEY=${GEE_SERVICE_ACCOUNT_KEY:-}
    networks:
      - consorcio-network
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 -Q celery
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ===========================================
# NETWORKS
# ===========================================
networks:
  consorcio-network:
    driver: bridge

# ===========================================
# VOLUMES
# ===========================================
volumes:
  postgres-data:
  redis-data:
  geo-data:
